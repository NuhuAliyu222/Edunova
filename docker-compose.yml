services:
  mysql:
    image: mysql:8.0
    container_name: edunova-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: edunova
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro

  api:
    image: php:8.2-apache
    container_name: edunova-api
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
    environment:
      DB_HOST: mysql
      DB_NAME: edunova
      DB_USER: root
      DB_PASS: root
      JWT_SECRET: edunova_docker_secret
    depends_on:
      - mysql

volumes:
  mysql_data:
